name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest llama-index-core==0.14.22 mcp

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --diff .
        continue-on-error: true

      - name: Run knowledge-rag tests
        working-directory: knowledge-rag
        run: pytest

      - name: Run ops-agent tests
        working-directory: ops-agent
        run: pytest
