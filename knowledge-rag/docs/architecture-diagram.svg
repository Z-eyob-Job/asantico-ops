<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <style>
    .box { fill: #f4f6fb; stroke: #3b5bdb; stroke-width: 1.5; rx: 10; }
    .store { fill: #fff4e6; stroke: #e8590c; stroke-width: 1.5; }
    .eval { fill: #ebfbee; stroke: #2f9e44; stroke-width: 1.5; }
    .agent { fill: #f3f0ff; stroke: #7048e8; stroke-width: 1.5; }
    .title { font-size: 20px; font-weight: 700; fill: #212529; }
    .sub { font-size: 12px; fill: #495057; }
    .lab { font-size: 13px; font-weight: 600; fill: #212529; }
    .small { font-size: 11px; fill: #868e96; }
    .arrow { stroke: #495057; stroke-width: 1.6; fill: none; marker-end: url(#ah); }
    .arrow2 { stroke: #2f9e44; stroke-width: 1.6; fill: none; marker-end: url(#ahg); stroke-dasharray: 5 3; }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#495057"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2f9e44"/>
    </marker>
  </defs>

  <text x="30" y="38" class="title">Knowledge RAG Pipeline: LlamaIndex + AgentWorkflow</text>
  <text x="30" y="58" class="small">Asantico knowledge base. Offline-reproducible (hash embedding); learned backend is a one-line swap.</text>

  <!-- Stage 1 Ingestion -->
  <rect x="30" y="90" width="180" height="74" rx="10" class="box"/>
  <text x="46" y="116" class="lab">1. Ingestion</text>
  <text x="46" y="135" class="sub">SimpleDirectoryReader</text>
  <text x="46" y="151" class="sub">corpus/*.md -&gt; Documents</text>

  <!-- Stage 2 Chunking -->
  <rect x="250" y="90" width="180" height="74" rx="10" class="box"/>
  <text x="266" y="116" class="lab">2. Chunking</text>
  <text x="266" y="135" class="sub">SentenceSplitter</text>
  <text x="266" y="151" class="sub">size 384 / overlap 64</text>

  <!-- Stage 3 Embedding + Indexing -->
  <rect x="470" y="90" width="190" height="74" rx="10" class="box"/>
  <text x="486" y="116" class="lab">3. Embed + Index</text>
  <text x="486" y="135" class="sub">hash | openai | hf</text>
  <text x="486" y="151" class="sub">VectorStoreIndex</text>

  <!-- Persisted store -->
  <rect x="700" y="90" width="190" height="74" rx="10" class="store"/>
  <text x="716" y="116" class="lab">Persisted Index</text>
  <text x="716" y="135" class="sub">data/index/</text>
  <text x="716" y="151" class="sub">reload, no re-embed</text>

  <!-- arrows row 1 -->
  <path class="arrow" d="M210,127 L248,127"/>
  <path class="arrow" d="M430,127 L468,127"/>
  <path class="arrow" d="M660,127 L698,127"/>

  <!-- Stage 4 Retrieval -->
  <rect x="700" y="230" width="190" height="78" rx="10" class="box"/>
  <text x="716" y="257" class="lab">4. Retrieval</text>
  <text x="716" y="276" class="sub">VectorIndexRetriever</text>
  <text x="716" y="292" class="sub">top_k 4</text>

  <!-- down arrow store -> retrieval -->
  <path class="arrow" d="M795,164 L795,228"/>

  <!-- Evaluator -->
  <rect x="470" y="230" width="190" height="78" rx="10" class="eval"/>
  <text x="486" y="257" class="lab">Retrieval Eval</text>
  <text x="486" y="276" class="sub">hit rate + MRR</text>
  <text x="486" y="292" class="sub">no LLM, offline</text>

  <!-- retrieval -> eval (dashed green) -->
  <path class="arrow2" d="M698,269 L662,269"/>

  <!-- Stage 5 Generation -->
  <rect x="700" y="370" width="190" height="78" rx="10" class="box"/>
  <text x="716" y="397" class="lab">5. Generation</text>
  <text x="716" y="416" class="sub">QueryEngine</text>
  <text x="716" y="432" class="sub">grounded + citations</text>

  <!-- retrieval -> generation -->
  <path class="arrow" d="M795,308 L795,368"/>

  <!-- QueryEngineTool -->
  <rect x="470" y="370" width="190" height="78" rx="10" class="agent"/>
  <text x="486" y="397" class="lab">QueryEngineTool</text>
  <text x="486" y="416" class="sub">course_kb</text>
  <text x="486" y="432" class="sub">retrieval as a tool</text>

  <!-- generation -> tool -->
  <path class="arrow" d="M698,409 L662,409"/>

  <!-- AgentWorkflow -->
  <rect x="240" y="370" width="190" height="78" rx="10" class="agent"/>
  <text x="256" y="397" class="lab">AgentWorkflow</text>
  <text x="256" y="416" class="sub">decides when to</text>
  <text x="256" y="432" class="sub">consult the KB</text>

  <!-- tool -> agent -->
  <path class="arrow" d="M468,409 L432,409"/>

  <!-- User query in -->
  <rect x="30" y="370" width="170" height="78" rx="10" class="box"/>
  <text x="46" y="397" class="lab">User query</text>
  <text x="46" y="416" class="sub">natural language</text>
  <text x="46" y="432" class="sub">question</text>
  <path class="arrow" d="M200,409 L238,409"/>

  <!-- iteration loop note -->
  <rect x="240" y="500" width="650" height="92" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="260" y="525" class="lab">Iteration loop</text>
  <text x="260" y="546" class="small">diagnose failures in the eval report  -&gt;  adjust one lever  -&gt;  re-run evaluate  -&gt;  compare metric delta</text>
  <text x="260" y="566" class="small">Levers in order: learned embedding, corpus expansion, chunk tuning, metadata filtering, reranking.</text>
  <text x="260" y="584" class="small">Acceptance target: hit rate &gt;= 0.90, MRR &gt;= 0.80 on the frozen question set.</text>

  <!-- arrow eval -> loop -->
  <path class="arrow2" d="M520,308 L520,498"/>
</svg>
